<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ UI Designer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>
                <i class="fas fa-code"></i>
                C++ UI Designer
            </h1>
            <div class="header-actions">
                <button id="saveProjectBtn" class="btn btn-secondary">
                    <i class="fas fa-save"></i> Save
                </button>
                <button id="loadProjectBtn" class="btn btn-secondary">
                    <i class="fas fa-folder-open"></i> Load
                </button>
                <button id="generateCodeBtn" class="btn btn-primary">
                    <i class="fas fa-download"></i> Generate C++ Code
                </button>
                <button id="exportCodeBtn" class="btn btn-success">
                    <i class="fas fa-file-code"></i> Export
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Toolbox -->
            <div class="toolbox">
                <h3><i class="fas fa-palette"></i> Components</h3>
                <div class="components-list">
                    <div class="component-item" data-type="window">
                        <i class="fas fa-window-maximize"></i>
                        <span>Window</span>
                    </div>
                    <div class="component-item" data-type="button">
                        <i class="fas fa-square"></i>
                        <span>Button</span>
                    </div>
                    <div class="component-item" data-type="label">
                        <i class="fas fa-tag"></i>
                        <span>Label</span>
                    </div>
                    <div class="component-item" data-type="textbox">
                        <i class="fas fa-i-cursor"></i>
                        <span>Text Box</span>
                    </div>
                    <div class="component-item" data-type="checkbox">
                        <i class="fas fa-check-square"></i>
                        <span>Check Box</span>
                    </div>
                    <div class="component-item" data-type="radiobutton">
                        <i class="fas fa-dot-circle"></i>
                        <span>Radio Button</span>
                    </div>
                    <div class="component-item" data-type="listbox">
                        <i class="fas fa-list"></i>
                        <span>List Box</span>
                    </div>
                    <div class="component-item" data-type="panel">
                        <i class="fas fa-border-all"></i>
                        <span>Panel</span>
                    </div>
                </div>
            </div>

            <!-- Canvas -->
            <div class="canvas-container">
                <div class="canvas-header">
                    <h3><i class="fas fa-paint-brush"></i> Design Canvas</h3>
                    <button id="previewBtn" class="btn-small">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                </div>
                <div id="canvas" class="canvas">
                    <!-- UI components will be placed here -->
                </div>
            </div>

            <!-- Properties Panel -->
            <div class="properties-panel">
                <h3><i class="fas fa-sliders-h"></i> Properties</h3>
                <div id="propertiesContent">
                    <p class="info-text">Select a component to edit properties</p>
                </div>
            </div>
        </div>

        <!-- Code Preview -->
        <div class="code-preview">
            <div class="code-header">
                <h3><i class="fas fa-code"></i> Generated C++ Code</h3>
                <button id="copyCodeBtn" class="btn-small">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
            <pre id="codeOutput" class="code-content"></pre>
        </div>
    </div>

    <!-- Modal for Preview -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>UI Preview</h3>
                <span class="close">&times;</span>
            </div>
            <div id="previewContent" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
